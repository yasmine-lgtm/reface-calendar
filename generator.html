<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reface – Reminder Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrap { background: #fff; border-radius: 20px; padding: 1.75rem; max-width: 460px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #999; margin-bottom: 1.5rem; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
  input, select { width: 100%; padding: 10px 13px; border: 1.5px solid #e5e5e5; border-radius: 10px; font-size: 14px; color: #111; background: #fff; outline: none; transition: border 0.15s; }
  input:focus, select:focus { border-color: #999; }
  .field { margin-bottom: 1rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .result { margin-top: 1.5rem; display: none; }
  .result.show { display: block; }
  .wa-card { background: #f0faf4; border-radius: 14px; padding: 1.125rem 1.25rem; margin-bottom: 12px; }
  .card-label { font-size: 11px; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .wa-text { font-size: 14px; color: #222; line-height: 1.75; white-space: pre-wrap; margin-bottom: 12px; }
  .link-card { background: #f8f8f8; border-radius: 14px; padding: 1.125rem 1.25rem; }
  .link-text { font-size: 12px; color: #888; word-break: break-all; line-height: 1.5; margin-bottom: 10px; }
  .copy-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; border-radius: 10px; background: #111; color: #fff; transition: background 0.15s; }
  .copy-btn:hover { background: #333; }
  .copy-btn.copied { background: #2a9d5c; }
  .copy-btn-outline { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1.5px solid #ddd; border-radius: 10px; background: transparent; color: #333; transition: background 0.15s; margin-top: 8px; }
  .copy-btn-outline:hover { background: #f5f5f5; }
  .copy-btn-outline.copied { color: #2a9d5c; border-color: #2a9d5c; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Reface reminders</h1>
  <p class="sub">Fill in the appointment — copy the WhatsApp message.</p>
  <div class="field">
    <label for="cname">Client name</label>
    <input type="text" id="cname" placeholder="e.g. Lara" oninput="generate()" />
  </div>
  <div class="row">
    <div class="field" style="margin-bottom:0">
      <label for="adate">Date</label>
      <input type="date" id="adate" oninput="generate()" />
    </div>
    <div class="field" style="margin-bottom:0">
      <label for="atime">Time</label>
      <input type="time" id="atime" oninput="generate()" />
    </div>
  </div>
  <div class="field" style="margin-top:1rem">
    <label for="dur">Duration</label>
    <select id="dur" onchange="generate()">
      <option value="30">30 minutes</option>
      <option value="45">45 minutes</option>
      <option value="60" selected>1 hour</option>
      <option value="90">1.5 hours</option>
      <option value="120">2 hours</option>
    </select>
  </div>
  <div id="result" class="result">
    <div class="wa-card">
      <div class="card-label">WhatsApp message</div>
      <div id="watext" class="wa-text"></div>
      <button class="copy-btn" id="wa-btn" onclick="copyWA()">Copy message</button>
    </div>
    <hr class="divider">
    <div class="link-card">
      <div class="card-label">Calendar link (iPhone + Android)</div>
      <div id="linktext" class="link-text"></div>
      <button class="copy-btn-outline" id="link-btn" onclick="copyLink()">Copy link only</button>
    </div>
  </div>
</div>
<script>
let calLink='';let waMsg='';
function pad(n){return String(n).padStart(2,'0');}
function addMins(dateStr,timeStr,mins){
  const dt=new Date(dateStr+'T'+timeStr);
  dt.setMinutes(dt.getMinutes()+parseInt(mins));
  return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate())+'T'+pad(dt.getHours())+':'+pad(dt.getMinutes());
}
function formatDisplay(dateStr,timeStr){
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dt=new Date(dateStr+'T'+timeStr);
  const hr=parseInt(timeStr.split(':')[0]);const mn=timeStr.split(':')[1];
  const ampm=hr>=12?'PM':'AM';const hr12=hr%12||12;
  return days[dt.getDay()]+' '+dt.getDate()+' '+months[dt.getMonth()]+' at '+hr12+':'+mn+' '+ampm;
}
function generate(){
  const name=document.getElementById('cname').value.trim();
  const date=document.getElementById('adate').value;
  const time=document.getElementById('atime').value;
  const dur=document.getElementById('dur').value;
  const result=document.getElementById('result');
  if(!date||!time){result.classList.remove('show');return;}
  const endTime=addMins(date,time,dur);
  const startISO=date+'T'+time;
  const display=formatDisplay(date,time);
  const base='https://yasmine-lgtm.github.io/reface-calendar/';
  calLink=base+'?t='+encodeURIComponent('Reface appointment')+'&s='+encodeURIComponent(startISO)+'&e='+encodeURIComponent(endTime)+(name?'&n='+encodeURIComponent(name):'');
  waMsg='Hi'+(name?' '+name:'')+' \uD83D\uDC4B\n\nJust a reminder of your Reface appointment on '+display+'.\n\nTap the link below to add it to your calendar \uD83D\uDCC5\n'+calLink;
  document.getElementById('linktext').textContent=calLink;
  document.getElementById('watext').textContent=waMsg;
  result.classList.add('show');
  document.getElementById('wa-btn').classList.remove('copied');
  document.getElementById('wa-btn').textContent='Copy message';
  document.getElementById('link-btn').classList.remove('copied');
  document.getElementById('link-btn').textContent='Copy link only';
}
function copyWA(){
  navigator.clipboard.writeText(waMsg).then(()=>{
    const btn=document.getElementById('wa-btn');
    btn.classList.add('copied');btn.textContent='\u2713 Copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy message';},2000);
  });
}
function copyLink(){
  navigator.clipboard.writeText(calLink).then(()=>{
    const btn=document.getElementById('link-btn');
    btn.classList.add('copied');btn.textContent='\u2713 Copied!';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy link only';},2000);
  });
}
document.getElementById('adate').valueAsDate=new Date();
generate();
</script>
</body>
</html>
