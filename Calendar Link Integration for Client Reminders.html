<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add to Calendar – Reface</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 20px; padding: 2rem 1.5rem; max-width: 380px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.09); text-align: center; }
  .logo { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; letter-spacing: -0.5px; }
  .tagline { font-size: 14px; color: #999; margin-bottom: 1.75rem; }
  .event-box { background: #f4f4f4; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.75rem; text-align: left; }
  .event-title { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .event-time { font-size: 14px; color: #666; }
  .section-label { font-size: 12px; color: #aaa; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  .cal-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid #eee; background: #fff; font-size: 15px; font-weight: 500; color: #111; cursor: pointer; margin-bottom: 10px; transition: background 0.15s, border 0.15s; text-decoration: none; }
  .cal-btn:hover { background: #f7f7f7; border-color: #ddd; }
  .cal-btn .icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .apple .icon { background: #000; color: #fff; }
  .google .icon { background: #fff; border: 1px solid #eee; }
  .outlook .icon { background: #0078d4; color: #fff; }
  .other .icon { background: #f0f0f0; color: #555; }
  .error { color: #c00; font-size: 14px; padding: 1rem; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Reface</div>
  <div class="tagline">Add your appointment to your calendar</div>

  <div id="event-box" class="event-box hidden">
    <div id="event-title" class="event-title"></div>
    <div id="event-time" class="event-time"></div>
  </div>

  <div id="error" class="error hidden">Invalid appointment link. Please contact Reface.</div>

  <div id="buttons" class="hidden">
    <div class="section-label">Choose your calendar</div>
    <a id="btn-apple" class="cal-btn apple" href="#">
      <span class="icon">&#xF8FF;</span> Apple Calendar
    </a>
    <a id="btn-google" class="cal-btn google" href="#">
      <span class="icon">
        <svg width="18" height="18" viewBox="0 0 48 48"><rect width="48" height="48" fill="none"/><path fill="#4285F4" d="M24 20v8h11.1c-.5 2.7-2 4.9-4.1 6.4v5.3h6.6C40.9 36.1 43 30.5 43 24c0-1.4-.1-2.7-.3-4H24z"/><path fill="#34A853" d="M24 43c5.8 0 10.6-1.9 14.2-5.2l-6.6-5.3C29.8 34 27 34.9 24 34.9c-5.6 0-10.3-3.8-12-8.9H5.2v5.4C8.8 38.7 15.9 43 24 43z"/><path fill="#FBBC05" d="M12 26c-.4-1.3-.7-2.6-.7-4s.2-2.7.7-4v-5.4H5.2C3.8 15.5 3 19.7 3 22c0 3.4.8 6.6 2.2 9.4L12 26z"/><path fill="#EA4335" d="M24 13.1c3.1 0 5.9 1.1 8.1 3.2l6-6C34.6 6.9 29.8 5 24 5 15.9 5 8.8 9.3 5.2 15.6l6.8 5.4C13.7 16.9 18.4 13.1 24 13.1z"/></svg>
      </span> Google Calendar
    </a>
    <a id="btn-outlook" class="cal-btn outlook" href="#">
      <span class="icon">&#x2709;</span> Outlook
    </a>
    <a id="btn-other" class="cal-btn other" href="#" download="reface-appointment.ics">
      <span class="icon">&#x1F4C5;</span> Other / Download
    </a>
  </div>
</div>

<script>
function pad(n) { return String(n).padStart(2, '0'); }

function parseParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    title: p.get('t'),
    start: p.get('s'),
    end: p.get('e'),
    name: p.get('n')
  };
}

function toGCal(s, e) {
  return s.replace(/[-:T]/g,'').substring(0,15).replace('T','T') + '/' + e.replace(/[-:T]/g,'').substring(0,15);
}

function formatGCalDate(dt) {
  // dt = "2026-06-25T15:00"
  return dt.replace(/-/g,'').replace(':','').replace('T','T') + '00';
}

function makeICS(title, start, end) {
  const s = start.replace(/[-:]/g,'').replace('T','T') + '00';
  const e = end.replace(/[-:]/g,'').replace('T','T') + '00';
  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Reface//Appointment//EN',
    'BEGIN:VEVENT',
    'DTSTART:' + s,
    'DTEND:' + e,
    'SUMMARY:' + title,
    'DESCRIPTION:Your Reface appointment. See you soon!',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
  return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
}

function formatDisplay(dt) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = new Date(dt);
  const hr = d.getHours();
  const mn = pad(d.getMinutes());
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const hr12 = hr % 12 || 12;
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ' · ' + hr12 + ':' + mn + ' ' + ampm;
}

function init() {
  const { title, start, end, name } = parseParams();

  if (!title || !start || !end) {
    document.getElementById('error').classList.remove('hidden');
    return;
  }

  const displayTitle = title + (name ? ' – ' + name : '');

  document.getElementById('event-title').textContent = displayTitle;
  document.getElementById('event-time').textContent = formatDisplay(start);
  document.getElementById('event-box').classList.remove('hidden');
  document.getElementById('buttons').classList.remove('hidden');

  const gcalStart = formatGCalDate(start);
  const gcalEnd = formatGCalDate(end);

  document.getElementById('btn-apple').href = makeICS(displayTitle, start, end);
  document.getElementById('btn-apple').download = 'reface-appointment.ics';

  document.getElementById('btn-google').href = 'https://www.google.com/calendar/render?action=TEMPLATE&text=' + encodeURIComponent(displayTitle) + '&dates=' + gcalStart + '/' + gcalEnd + '&details=' + encodeURIComponent('Your Reface appointment. See you soon!');
  document.getElementById('btn-google').target = '_blank';

  document.getElementById('btn-outlook').href = 'https://outlook.live.com/calendar/0/deeplink/compose?subject=' + encodeURIComponent(displayTitle) + '&startdt=' + start + '&enddt=' + end + '&body=' + encodeURIComponent('Your Reface appointment. See you soon!');
  document.getElementById('btn-outlook').target = '_blank';

  document.getElementById('btn-other').href = makeICS(displayTitle, start, end);
  document.getElementById('btn-other').download = 'reface-appointment.ics';
}

init();
</script>
</body>
</html>
